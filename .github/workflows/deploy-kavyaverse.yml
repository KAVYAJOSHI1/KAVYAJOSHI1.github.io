name: Deploy KavyaVerse

on:
  push:
    branches: [main]
    paths:
      - "kavyaverse-src/**"
      - ".github/workflows/deploy-kavyaverse.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: kavyaverse-src/package-lock.json

      - name: Install dependencies
        working-directory: kavyaverse-src
        run: npm ci

      - name: Build static export
        working-directory: kavyaverse-src
        run: npm run build

      - name: Deploy to /kavyaverse
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: kavyaverse-src/out
          destination_dir: kavyaverse
          publish_branch: main
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
